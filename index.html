<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой сайт</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
        background: linear-gradient(270deg, #ff6b6b, #5f27cd, #1dd1a1);
        background-size: 600% 600%;
        animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    h1 {
        margin-top: 50px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .box {
        margin-top: 30px;
        width: 200px;
        height: 200px;
        background: white;
        margin-left: auto;
        margin-right: auto;
        border-radius: 20px;
        transition: 0.5s;
    }
</style>
</head>

<body>

<h1>🔥 Мой интерактивный сайт</h1>

<button onclick="changeColor()">Сменить цвет блока</button>
<button onclick="rotateBox()">Крутить блок</button>
<button onclick="changeBackground()">Сменить фон</button>

<div class="box" id="box"></div>

<script>
    function changeColor() {
        const colors = ["red", "blue", "green", "yellow", "purple"];
        let random = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById("box").style.background = random;
    }

    function rotateBox() {
        let box = document.getElementById("box");
        box.style.transform = "rotate(360deg)";
        setTimeout(() => {
            box.style.transform = "rotate(0deg)";
        }, 500);
    }

    function changeBackground() {
        let colors = [
            "linear-gradient(45deg, #ff9a9e, #fad0c4)",
            "linear-gradient(45deg, #a18cd1, #fbc2eb)",
            "linear-gradient(45deg, #f6d365, #fda085)",
            "linear-gradient(45deg, #96fbc4, #f9f586)"
        ];
        let random = colors[Math.floor(Math.random() * colors.length)];
        document.body.style.background = random;
    }
</script>

</body>
</html>
